apiVersion: apps/v1
kind: Deployment
metadata:
  name: scalebox-assistant
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: scalebox-assistant
  template:
    metadata:
      labels:
        app: scalebox-assistant
      annotations:
        kubernetes.io/ingress-bandwidth: "100M"   # 入站 100 MB
        kubernetes.io/egress-bandwidth: "100M"    # 出站 100 MB
    spec:
      runtimeClassName: kata-runtime
      containers:
        - name: scalebox-assistant
          image: harbor.scalebocs.com:5443/library/scalebox-assistant:v1.0
          imagePullPolicy: IfNotPresent
          securityContext:
            readOnlyRootFilesystem: false
            runAsUser: 0
            runAsGroup: 0
            capabilities:
              add:
                - SYS_ADMIN
          ports:
            - containerPort: 3000
              name: http
          resources:
            limits:
              memory: "8Gi"
              cpu: "8"
          readinessProbe:
            httpGet:
              path: /api/health   # 后端健康检查路由
              port: 3000
            initialDelaySeconds: 0
            periodSeconds: 1
            timeoutSeconds: 2
            successThreshold: 1
            failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata:
  name: scalebox-assistant-service
  namespace: default
spec:
  selector:
    app: scalebox-assistant
  ports:
    - name: http
      port: 3000          # Service 暴露的端口
      targetPort: 3000    # Pod 内容器端口
      protocol: TCP
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: scalebox-assistant-ing
  namespace: default
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/limit-connections: "200"
    nginx.ingress.kubernetes.io/limit-rate: 2m
    nginx.ingress.kubernetes.io/limit-req-status-code: "429"
    nginx.ingress.kubernetes.io/limit-rps: "1000"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "180"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "180"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "30"
spec:
  ingressClassName: nginx
  rules:
    - host: scalebox-assistant.k27xn5o3lnw5dan3x.scalebox.dev    # 按需改成你的域名
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: scalebox-assistant-service
                port:
                  number: 3000